### DPO on top of the merged SFT model.
### The policy starts as sft-merged and learns a fresh LoRA adapter; because the
### adapter starts at zero, LLaMA-Factory uses sft-merged with the adapter disabled
### as the frozen reference — i.e. the reference IS the SFT model, which is correct.

### Model
model_name_or_path: models/sft-merged
trust_remote_code: true

### Method
stage: dpo
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
pref_beta: 0.1
pref_loss: sigmoid

### Dataset
dataset_dir: configs
dataset: medical_dpo
template: mistral
cutoff_len: 2048
max_samples: 800
overwrite_cache: true
preprocessing_num_workers: 4

### Output
output_dir: outputs/dpo
logging_steps: 5
save_steps: 1000
plot_loss: true
overwrite_output_dir: true
report_to: none

### Training hyperparameters
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000

### Quantization (QLoRA)
quantization_bit: 4
quantization_type: nf4
